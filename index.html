<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Placeholder</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      background-color: #0d0d0f;
      color: #f5f5f7;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 3rem 2.5rem;
      text-align: center;
    }

    svg {
      width: clamp(120px, 25vw, 200px);
      height: auto;
    }

    .email {
      font-size: clamp(1rem, 2.2vw, 1.35rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main class="card">
    <svg viewBox="0 0 120 120" role="img" aria-labelledby="logoTitle logoDesc">
      <title id="logoTitle">Personal Monogram</title>
      <desc id="logoDesc">Abstract circular emblem with intertwined initials</desc>
      <circle cx="60" cy="60" r="56" fill="none" stroke="currentColor" stroke-width="4" opacity="0.25" />
      <path d="M35 85 L60 35 L85 85" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="60" cy="60" r="12" fill="currentColor" opacity="0.85" />
    </svg>
    <a class="email" href="mailto:me@example.com">me@example.com</a>
  </main>
</body>
</html>
