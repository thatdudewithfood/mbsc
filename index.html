<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mustajbasic</title>
  <link rel="icon" href="https://mbsc.si/favicon.ico" type="image/x-icon" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, 'Segoe UI', system-ui, sans-serif;
      background-color: #0a0a0a;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .name {
      font-size: clamp(2.4rem, 8vw, 5.5rem);
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      line-height: 1.1;
      margin-bottom: 2.5rem;
      position: relative;
    }

    .name::after {
      content: '';
      display: block;
      width: 60px;
      height: 1px;
      background: #e8e8e8;
      margin: 2rem auto 0;
      opacity: 0.3;
    }

    .email {
      display: inline-block;
      font-size: clamp(0.75rem, 1.8vw, 0.95rem);
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: lowercase;
      color: #888;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .email:hover {
      color: #e8e8e8;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1 class="name">Mustajbasic</h1>
    <a href="mailto:haris@mbsc.si" class="email">haris@mbsc.si</a>
  </main>
</body>
</html>
